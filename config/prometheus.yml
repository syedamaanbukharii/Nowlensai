# Prometheus scrape configuration for the NowLens stack.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: nowlens-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: nowlens-api
