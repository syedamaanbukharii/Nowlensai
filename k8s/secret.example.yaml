# TEMPLATE ONLY — do not commit real secrets. Copy to secret.yaml (gitignored),
# fill in real values, and apply separately, or (preferred) manage with a Secret
# operator (External Secrets, Sealed Secrets, or your cloud's secret manager via
# CSI). Create imperatively instead with, e.g.:
#
#   kubectl -n nowlens create secret generic nowlens-secrets \
#     --from-literal=NOWLENS_SECURITY__JWT_SECRET="$(python -c 'import secrets;print(secrets.token_urlsafe(48))')" \
#     --from-literal=NOWLENS_DATABASE_URL="postgresql+asyncpg://user:pass@host:5432/nowlens"
#
# In production the app refuses to start unless NOWLENS_SECURITY__JWT_SECRET is a
# strong secret of >=32 characters (the placeholder below is rejected).
apiVersion: v1
kind: Secret
metadata:
  name: nowlens-secrets
  namespace: nowlens
type: Opaque
stringData:
  NOWLENS_SECURITY__JWT_SECRET: "REPLACE_WITH_A_STRONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
  NOWLENS_DATABASE_URL: "postgresql+asyncpg://nowlens:CHANGEME@postgres:5432/nowlens"
  # Optional, depending on configured providers:
  # NOWLENS_LLM__GROQ_API_KEY: ""
  # NOWLENS_QDRANT_API_KEY: ""
