# The frontend is a Next.js standalone server. NEXT_PUBLIC_API_BASE_URL is baked
# in at *build* time, so the image must be built with the public API URL
# (--build-arg NEXT_PUBLIC_API_BASE_URL=https://...); it cannot be changed here
# at runtime. Many deployments serve the frontend from Vercel instead and run
# only the API in-cluster — in that case this manifest is optional.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nowlens-frontend
  namespace: nowlens
  labels:
    app.kubernetes.io/name: nowlens
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nowlens
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nowlens
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: nowlens-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
