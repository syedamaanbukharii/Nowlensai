# Alembic configuration for NowLens AI.
# The database URL is injected at runtime from application settings
# (see src/nowlens/db/migrations/env.py); the value below is a placeholder.

[alembic]
script_location = src/nowlens/db/migrations
prepend_sys_path = src
sqlalchemy.url = postgresql+asyncpg://nowlens:nowlens@localhost:5432/nowlens
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
